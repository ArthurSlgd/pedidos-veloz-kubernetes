services:

  gateway:
    build: ./gateway
    ports:
      - "3000:3000"

  pedidos:
    build: ./pedidos-service
    ports:
      - "3001:3000"

  postgres:
    image: postgres:16

    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: pedidos_db

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

  rabbitmq:
    image: rabbitmq:3-management

    ports:
      - "5672:5672"
      - "15672:15672"

volumes:
  postgres_data: