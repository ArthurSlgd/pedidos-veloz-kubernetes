apiVersion: apps/v1
kind: Deployment

metadata:
  name: pedidos

spec:
  replicas: 2

  selector:
    matchLabels:
      app: pedidos

  template:

    metadata:
      labels:
        app: pedidos

    spec:

      containers:

      - name: pedidos

        image: pedidos-veloz-pedidos:latest

        imagePullPolicy: IfNotPresent

        ports:
        - containerPort: 3000

        env:

        - name: DB_HOST
          valueFrom:
            configMapKeyRef:
              name: app-config
              key: DB_HOST